<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/oem-dashboard.css" />
  <link rel="stylesheet" href="./css/shared.css" />
</head>
<body>

<div class="oem-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>OEM Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="OEM navigation">
      <a href="/oem-dashboard.html"  class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/oem-rfq.html"        class="nav-item"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Management</span></a>
      <a href="/oem-orders.html"     class="nav-item active"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span>Orders</span></a>
      <a href="/oem-suppliers.html"  class="nav-item"><i class="fas fa-truck"          aria-hidden="true"></i><span>Suppliers</span></a>
      <a href="/oem-documents.html"  class="nav-item"><i class="fas fa-folder-open"   aria-hidden="true"></i><span>Documents</span></a>
      <a href="/oem-profile.html"    class="nav-item"><i class="fas fa-building"      aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" set by init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-industry"></i></div>
        </div>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>Purchase Orders</h1>
        <p>Track and manage all your orders</p>
      </div>
    </div>

    <!-- ── Filters Bar ────────────────────────────
         statusFilter   — el("statusFilter") in bindEvents()
         searchInput    — el("searchInput")  in bindEvents()
         clearSearchBtn — el("clearSearchBtn") in bindEvents()
         resultCount    — setText("resultCount", "X of Y orders") in renderOrders()
    ──────────────────────────────────────────── -->
    <div class="filters-bar">

      <!-- Status filter — triggers applyFilters() on change -->
      <select id="statusFilter" class="filter-select" aria-label="Filter by status">
        <option value="all">All Orders</option>
        <option value="pending">Pending</option>
        <option value="accepted">Accepted</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="delayed">Delayed</option>
      </select>

      <!-- Search — debounced, filters State.allOrders client-side -->
      <div class="search-wrap">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by PO number, part or supplier…"
          aria-label="Search orders"
        />
        <!-- clearSearchBtn — resets searchInput and re-renders -->
        <button
          type="button"
          id="clearSearchBtn"
          class="btn btn--ghost btn--sm search-clear"
          aria-label="Clear search"
          title="Clear search"
        >
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Result count — setText("resultCount", ...) in renderOrders() -->
      <span id="resultCount" class="result-count" aria-live="polite"></span>

    </div>

    <!-- ── Orders Table ───────────────────────────
         Table structure must match renderOrderRow() exactly.

         renderOrderRow() produces 8 <td> per row:
           1. PO Number   (.po-number)
           2. Part Name
           3. Supplier
           4. Qty         (.td-number)
           5. Value       (.td-number)
           6. Status      (.badge)
           7. Progress    (.progress-wrap)
           8. Date

         _tableLoading() and _tableEmpty() use colspan="7" — they
         will still span correctly as long as thead has 8 <th>.
         (colspan >= actual width just stretches across all cols)

         tbody id="ordersTableBody" — required by:
           el("ordersTableBody") in loadOrders(), renderOrders(),
           bindEvents() click/keydown delegation
    ──────────────────────────────────────────── -->
    <div class="orders-table-card">
      <div class="table-container">
        <table class="data-table" aria-label="Purchase orders">
          <thead>
            <tr>
              <th scope="col">PO Number</th>
              <th scope="col">Part Name</th>
              <th scope="col">Supplier</th>
              <th scope="col" class="td-number">Qty</th>
              <th scope="col" class="td-number">Value</th>
              <th scope="col">Status</th>
              <th scope="col">Progress</th>
              <th scope="col">Date</th>
            </tr>
          </thead>
          <!--
            id="ordersTableBody"
            Old HTML used <div id="ordersList"> — wrong element type.
            JS injects <tr> elements so this MUST be a <tbody>.
          -->
          <tbody id="ordersTableBody" aria-live="polite">
            <!-- skeleton injected by _tableLoading() on first load -->
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!--
  Old HTML had an #orderModal that JS never opens.
  orders.js navigates directly to the order detail page on row click.
  Modal removed entirely — it was dead UI.
-->

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="./js/pages/oem/orders.js"></script>

</body>
</html>
