<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Details | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Base layout -->
  <link rel="stylesheet" href="/css/supplier-dashboard.css" />
  <!-- Shared: badges, buttons, skeletons, chat, milestone-step, od-* layout -->
  <link rel="stylesheet" href="/css/shared.css" />
  <!-- Supplier-specific: rfq-card, quote tabs, etc. -->
  <link rel="stylesheet" href="/css/supplier.css" />
</head>
<body>

<div class="supplier-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>Supplier Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="Supplier navigation">
      <a href="/supplier-dashboard.html" class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/supplier-rfq.html"       class="nav-item"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Inbox</span></a>
      <a href="/supplier-quotes.html"    class="nav-item"><i class="fas fa-comment-dollar" aria-hidden="true"></i><span>My Quotes</span></a>
      <a href="/supplier-orders.html"    class="nav-item active"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span>My Orders</span></a>
      <a href="/supplier-profile.html"   class="nav-item"><i class="fas fa-building"      aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <!-- id="menuToggle" — bindEvents() -->
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" — setText("companyName", ...) in init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-truck"></i></div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         ORDER DETAILS CONTAINER
         id="orderDetailsContainer":
           loadOrderDetails() → classList.add/remove("loading")
           loadOrderDetails() → setHTML() for error / empty states

         All named child elements below are populated by setText().
         Skeleton state is shown by the "—" defaults.
         ═══════════════════════════════════════════════════════════ -->
    <div id="orderDetailsContainer" class="order-detail-page">

      <!-- ── Page Header ─────────────────────────────────────── -->
      <div class="od-page-header">
        <!-- id="backBtn" — bindEvents() → CONFIG.ROUTES.SUPPLIER_ORDERS -->
        <button class="btn btn--ghost btn--sm" id="backBtn" type="button">
          <i class="fas fa-arrow-left" aria-hidden="true"></i> Back to Orders
        </button>
        <span class="od-page-label">Purchase Order</span>
      </div>

      <!-- ── PO Header Card ──────────────────────────────────── -->
      <div class="od-header-card od-header-card--supplier">
        <div class="od-header-card__left">
          <div class="od-header-card__label">PO Number</div>
          <!--
            id="poNumber"
            setText("poNumber", order.po_number || `PO-${order.id}`)
          -->
          <div class="od-header-card__po" id="poNumber">—</div>
        </div>
        <div class="od-header-card__right">
          <!--
            id="orderStatus"
            statusEl.textContent = formatStatus(order.status)
            statusEl.className   = `badge badge--${statusClass}`
          -->
          <span id="orderStatus" class="badge badge--neutral">Loading…</span>
        </div>
      </div>

      <!-- ── PO Stats Row ────────────────────────────────────── -->
      <div class="od-stats-row">

        <div class="od-stat">
          <span class="od-stat__label">
            <i class="fas fa-building" aria-hidden="true"></i> OEM / Buyer
          </span>
          <!-- id="oemName" — setText("oemName", order.oem_name) -->
          <span class="od-stat__value" id="oemName">—</span>
        </div>

        <div class="od-stat">
          <span class="od-stat__label">
            <i class="fas fa-calendar" aria-hidden="true"></i> Order Date
          </span>
          <!-- id="orderDate" — setText("orderDate", formatDate(order.created_at)) -->
          <span class="od-stat__value" id="orderDate">—</span>
        </div>

        <div class="od-stat">
          <span class="od-stat__label">
            <i class="fas fa-dollar-sign" aria-hidden="true"></i> Total Value
          </span>
          <!-- id="orderValue" — setText("orderValue", formatCurrency(...)) -->
          <span class="od-stat__value" id="orderValue">—</span>
        </div>

        <div class="od-stat">
          <span class="od-stat__label">
            <i class="fas fa-box" aria-hidden="true"></i> Quantity
          </span>
          <!-- id="orderQuantity" — setText("orderQuantity", `${qty} ${unit}`) -->
          <span class="od-stat__value" id="orderQuantity">—</span>
        </div>

      </div><!-- /.od-stats-row -->

      <!-- ── Info Cards ──────────────────────────────────────── -->
      <div class="od-info-grid">

        <div class="od-info-card">
          <div class="od-info-card__label">Part Name</div>
          <!-- id="partName" — setText("partName", order.part_name) -->
          <div class="od-info-card__value" id="partName">—</div>
        </div>

        <div class="od-info-card">
          <div class="od-info-card__label">Payment Terms</div>
          <!-- id="paymentTerms" — setText("paymentTerms", order.payment_terms) -->
          <div class="od-info-card__value" id="paymentTerms">—</div>
        </div>

      </div><!-- /.od-info-grid -->

      <!-- ── Production Timeline ─────────────────────────────── -->
      <div class="od-card">
        <div class="od-card__header">
          <h2 class="od-card__title">
            <i class="fas fa-chart-line" aria-hidden="true"></i> Production Timeline
          </h2>
        </div>
        <div class="od-card__body">

          <!--
            id="timelineSteps"
            renderMilestones() injects .milestone-step children.
            Supplier gets two buttons per step:
              .js-mark-complete  → updateMilestone(..., "completed")
              .js-mark-progress  → updateMilestone(..., "in_progress")
            Both wired via event delegation in bindEvents().
          -->
          <div id="timelineSteps" aria-live="polite"></div>

          <!-- Progress bar -->
          <div class="od-progress-row">
            <div class="progress-bar od-progress-bar">
              <!--
                id="progressBarFill"
                renderMilestones(): bar.style.width = `${progress}%`
              -->
              <div class="progress-bar__fill progress-bar__fill--supplier" id="progressBarFill" style="width:0%"></div>
            </div>
            <!--
              id="progressText"
              setText("progressText", `${progress}% Complete`)
            -->
            <span class="progress-label" id="progressText">0% Complete</span>
          </div>

        </div>
      </div><!-- /.od-card (timeline) -->

      <!-- ── Communication Thread ────────────────────────────── -->
      <div class="od-card od-chat-card">
        <div class="od-card__header">
          <h2 class="od-card__title">
            <i class="fas fa-comments" aria-hidden="true"></i> Communication with Buyer
          </h2>
        </div>

        <!--
          id="chatMessages"
          renderMessages() / appendMessage() inject .chat-msg children.
          Sent messages use .chat-msg--sent (Supplier type = green bubble via supplier CSS).
        -->
        <div class="od-chat-messages" id="chatMessages" aria-live="polite" aria-label="Message thread">
          <div class="chat-empty">
            <p>Loading messages…</p>
          </div>
        </div>

        <!-- Chat Input -->
        <div class="od-chat-input">
          <!--
            id="messageInput"
            sendMessage() reads .value.trim()
            keydown: Enter (no Shift) → sendMessage()
          -->
          <textarea
            id="messageInput"
            class="od-chat-textarea od-chat-textarea--supplier"
            rows="2"
            placeholder="Type your message… Shift+Enter for new line, Enter to send"
            aria-label="Message input"
          ></textarea>

          <!--
            id="sendBtn"
            sendMessage(): btn.disabled = true; btn.textContent = "Sending…"
          -->
          <button class="btn btn--success" id="sendBtn" type="button">
            <i class="fas fa-paper-plane" aria-hidden="true"></i> Send
          </button>
        </div>

      </div><!-- /.od-card (chat) -->

    </div><!-- /#orderDetailsContainer -->

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="/js/pages/supplier/order-details.js"></script>

</body>
</html>
