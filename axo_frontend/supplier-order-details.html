<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | AXO Networks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/supplier-dashboard.css">
    <style>
        .order-details-container { max-width: 1200px; margin: 0 auto; }
        .po-header { background: linear-gradient(135deg, #064e3b, #022c22); color: white; padding: 30px; border-radius: 20px; margin-bottom: 24px; }
        .po-number { font-size: 14px; opacity: 0.8; margin-bottom: 8px; }
        .po-title { font-size: 28px; font-weight: 700; margin: 8px 0; }
        .po-stats { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
        .po-stat { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 30px; font-size: 13px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .info-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; }
        .info-card h3 { font-size: 13px; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-card .value { font-size: 18px; font-weight: 700; color: #1e293b; }
        
        /* Timeline Styles */
        .timeline-container { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .timeline-steps { display: flex; justify-content: space-between; position: relative; margin: 40px 0; flex-wrap: wrap; gap: 10px; }
        .timeline-steps::before { content: ''; position: absolute; top: 30px; left: 0; right: 0; height: 2px; background: #e2e8f0; z-index: 0; }
        .timeline-step { text-align: center; flex: 1; position: relative; z-index: 1; min-width: 100px; }
        .step-icon { width: 60px; height: 60px; background: white; border: 2px solid #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; transition: all 0.3s; }
        .step-icon.completed { background: #10b981; border-color: #10b981; color: white; }
        .step-icon.active { border-color: #10b981; background: #ecfdf5; color: #10b981; animation: pulse 1.5s infinite; }
        .step-label { font-size: 11px; font-weight: 500; color: #64748b; }
        .step-label.completed { color: #10b981; font-weight: 600; }
        .step-label.active { color: #10b981; font-weight: 600; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Progress Bar */
        .progress-bar-bg { background: #e2e8f0; border-radius: 20px; height: 10px; overflow: hidden; margin-top: 20px; }
        .progress-bar-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; border-radius: 20px; transition: width 0.5s ease; }
        
        /* Milestone Update Section */
        .milestone-update-section { background: #f8fafc; border-radius: 16px; padding: 20px; margin-top: 20px; }
        .milestone-update-section h4 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .milestone-select-row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
        .milestone-select-row select { padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: white; flex: 1; }
        .milestone-select-row button { padding: 10px 24px; }
        
        /* Chat Styles */
        .chat-container { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; margin-top: 24px; }
        .chat-header { background: #f8fafc; padding: 16px 20px; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 20px; background: #fafbfc; }
        .message { margin-bottom: 20px; display: flex; animation: fadeIn 0.3s ease; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-bubble { max-width: 70%; padding: 12px 16px; border-radius: 20px; }
        .message.sent .message-bubble { background: linear-gradient(135deg, #10b981, #059669); color: white; border-bottom-right-radius: 4px; }
        .message.received .message-bubble { background: white; color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .message-sender { font-size: 12px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .message-text { font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .message-time { font-size: 10px; margin-top: 6px; opacity: 0.7; text-align: right; }
        .chat-input { display: flex; gap: 12px; padding: 16px 20px; border-top: 1px solid #e2e8f0; background: white; }
        .chat-input textarea { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 24px; resize: none; font-family: inherit; font-size: 14px; }
        .chat-input textarea:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .chat-input button { padding: 12px 28px; background: #10b981; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .empty-chat { text-align: center; color: #94a3b8; padding: 60px 20px; }
        .empty-chat i { font-size: 48px; margin-bottom: 16px; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-update { background: #10b981; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .btn-update:hover { background: #059669; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="supplier-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2>AXO Networks</h2><p>Supplier Portal</p></div>
            <nav class="sidebar-nav">
                <a href="/supplier-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="/supplier-rfq.html" class="nav-item"><i class="fas fa-file-alt"></i><span>RFQ Inbox</span></a>
                <a href="/supplier-quotes.html" class="nav-item"><i class="fas fa-comment-dollar"></i><span>My Quotes</span></a>
                <a href="/supplier-orders.html" class="nav-item active"><i class="fas fa-shopping-cart"></i><span>My Orders</span></a>
                <a href="/supplier-profile.html" class="nav-item"><i class="fas fa-building"></i><span>Profile</span></a>
            </nav>
            <div class="sidebar-footer"><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        </aside>

        <main class="main-content">
            <div id="orderDetailsContainer" class="order-details-container">
                <div class="loading">Loading order details...</div>
            </div>
        </main>
    </div>

    <script src="/js/supplier-order-details.js"></script>
</body>
</html>
