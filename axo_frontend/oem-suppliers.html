<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers | AXO Networks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/oem-dashboard.css">
</head>
<body>
    <div class="oem-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2>AXO Networks</h2><p>OEM Portal</p></div>
            <nav class="sidebar-nav">
                <a href="/oem-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="/oem-rfq.html" class="nav-item"><i class="fas fa-file-alt"></i><span>RFQ Management</span></a>
                <a href="/oem-orders.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Orders</span></a>
                <a href="/oem-suppliers.html" class="nav-item active"><i class="fas fa-truck"></i><span>Suppliers</span></a>
                <a href="/oem-documents.html" class="nav-item"><i class="fas fa-folder-open"></i><span>Documents</span></a>
                <a href="/oem-profile.html" class="nav-item"><i class="fas fa-building"></i><span>Profile</span></a>
            </nav>
            <div class="sidebar-footer"><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="top-bar-right">
                    <div class="notification-bell"><i class="far fa-bell"></i><span class="notification-badge">0</span></div>
                    <div class="user-info"><span id="companyName">Loading...</span><div class="avatar"><i class="fas fa-industry"></i></div></div>
                </div>
            </div>

            <div class="page-header"><div><h1>Supplier Network</h1><p>Manage your trusted suppliers</p></div><button class="btn-primary" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button></div>

            <div class="filters-bar"><input type="text" id="searchInput" placeholder="Search by name or capability..." class="search-input"></div>

            <div id="suppliersGrid" class="suppliers-grid"><div class="loading">Loading suppliers...</div></div>
        </main>
    </div>

    <!-- Supplier Details Modal -->
    <div id="supplierModal" class="modal">
        <div class="modal-content"><div class="modal-header"><h3><i class="fas fa-building"></i> Supplier Details</h3><button class="close-modal">&times;</button></div><div class="modal-body" id="supplierDetails"></div></div>
    </div>

    <script src="/js/oem-suppliers.js"></script>
</body>
</html>
