<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/oem-dashboard.css" />
  <link rel="stylesheet" href="./css/shared.css" />
</head>
<body>

<div class="oem-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>OEM Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="OEM navigation">
      <a href="/oem-dashboard.html"  class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/oem-rfq.html"        class="nav-item"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Management</span></a>
      <a href="/oem-orders.html"     class="nav-item"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span>Orders</span></a>
      <a href="/oem-suppliers.html"  class="nav-item active"><i class="fas fa-truck"  aria-hidden="true"></i><span>Suppliers</span></a>
      <a href="/oem-documents.html"  class="nav-item"><i class="fas fa-folder-open"   aria-hidden="true"></i><span>Documents</span></a>
      <a href="/oem-profile.html"    class="nav-item"><i class="fas fa-building"      aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" — setText() in init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-industry"></i></div>
        </div>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>Supplier Network</h1>
        <p>All active suppliers on the AXO Network</p>
      </div>
      <!-- id="refreshBtn" — bindEvents() → loadSuppliers() -->
      <button class="btn btn--outline" id="refreshBtn" type="button">
        <i class="fas fa-sync-alt" aria-hidden="true"></i> Refresh
      </button>
    </div>

    <!-- ── Filters bar ─────────────────────────────────────────
         searchInput    — debounced input → applySearch() → renderSuppliers()
         clearSearchBtn — resets input + re-renders
         supplierCount  — setText("supplierCount", "X of Y suppliers")
    ──────────────────────────────────────────────────────────── -->
    <div class="filters-bar">

      <div class="search-wrap">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by company name or email…"
          aria-label="Search suppliers"
        />
        <!--
          id="clearSearchBtn"
          bindEvents(): clears searchInput.value, resets State.searchQuery,
          calls renderSuppliers()
        -->
        <button
          type="button"
          id="clearSearchBtn"
          class="btn btn--ghost btn--sm search-clear"
          aria-label="Clear search"
          title="Clear search"
        >
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>

      <!--
        id="supplierCount"
        setText("supplierCount", `${filtered.length} of ${total} suppliers`)
      -->
      <span id="supplierCount" class="result-count" aria-live="polite"></span>

    </div>

    <!--
      id="suppliersGrid"
      renderSuppliers() injects .supplier-card items.
      loadSuppliers() injects 4× .skeleton-card placeholders.

      Note: supplierModal from the old HTML has been removed.
      suppliers.js never calls showEl("supplierModal") or
      setHTML("supplierDetails") — it was dead UI.
    -->
    <div id="suppliersGrid" class="suppliers-grid" aria-live="polite">
      <!-- skeleton shown by loadSuppliers() on first load -->
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="./js/pages/oem/suppliers.js"></script>

</body>
</html>
