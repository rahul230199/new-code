<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Quotes | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/supplier-dashboard.css" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/supplier.css" />
</head>
<body>

<div class="supplier-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>Supplier Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="Supplier navigation">
      <a href="/supplier-dashboard.html" class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/supplier-rfq.html"       class="nav-item"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Inbox</span></a>
      <a href="/supplier-quotes.html"    class="nav-item active"><i class="fas fa-comment-dollar" aria-hidden="true"></i><span>My Quotes</span></a>
      <a href="/supplier-orders.html"    class="nav-item"><i class="fas fa-shopping-cart"  aria-hidden="true"></i><span>My Orders</span></a>
      <a href="/supplier-profile.html"   class="nav-item"><i class="fas fa-building"      aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" — setText() in init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-truck"></i></div>
        </div>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>My Quotes</h1>
        <p>Track all your submitted quotes</p>
      </div>
      <!-- id="refreshBtn" — bindEvents() → loadQuotes() -->
      <button class="btn btn--outline" id="refreshBtn" type="button">
        <i class="fas fa-sync-alt" aria-hidden="true"></i> Refresh
      </button>
    </div>

    <!-- ── Status Filter Tabs ─────────────────────────────────────
         JS: document.querySelectorAll(".js-status-filter")
         Each btn needs data-status and class="js-status-filter"
         Active btn gets .active class added/removed by JS.

         Count spans:
           countAll      — setText("countAll",      total)
           countPending  — setText("countPending",  pending)
           countAccepted — setText("countAccepted", accepted)
           countRejected — setText("countRejected", rejected)
    ──────────────────────────────────────────────────────────── -->
    <div class="quote-filter-tabs" role="tablist" aria-label="Filter quotes by status">

      <button
        class="quote-filter-tab js-status-filter active"
        data-status="all"
        type="button"
        role="tab"
        aria-selected="true"
      >
        All
        <!-- id="countAll" — setText("countAll", total) -->
        <span class="quote-filter-tab__count" id="countAll">0</span>
      </button>

      <button
        class="quote-filter-tab js-status-filter"
        data-status="pending"
        type="button"
        role="tab"
        aria-selected="false"
      >
        Pending
        <!-- id="countPending" -->
        <span class="quote-filter-tab__count" id="countPending">0</span>
      </button>

      <button
        class="quote-filter-tab js-status-filter"
        data-status="accepted"
        type="button"
        role="tab"
        aria-selected="false"
      >
        Accepted
        <!-- id="countAccepted" -->
        <span class="quote-filter-tab__count" id="countAccepted">0</span>
      </button>

      <button
        class="quote-filter-tab js-status-filter"
        data-status="rejected"
        type="button"
        role="tab"
        aria-selected="false"
      >
        Rejected
        <!-- id="countRejected" -->
        <span class="quote-filter-tab__count" id="countRejected">0</span>
      </button>

    </div><!-- /.quote-filter-tabs -->

    <!-- ── Search + Result Count ──────────────────────────────────
         searchInput    — debounced input → applyFilters()
         clearSearchBtn — resets input + re-renders
         resultCount    — setText("resultCount", "X of Y quotes")
    ──────────────────────────────────────────────────────────── -->
    <div class="filters-bar">

      <div class="search-wrap">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by RFQ title, OEM or part name…"
          aria-label="Search quotes"
        />
        <!-- id="clearSearchBtn" — resets State.searchQuery + re-renders -->
        <button
          type="button"
          id="clearSearchBtn"
          class="btn btn--ghost btn--sm search-clear"
          aria-label="Clear search"
          title="Clear search"
        >
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>

      <!-- id="resultCount" — setText("resultCount", "3 of 10 quotes") -->
      <span id="resultCount" class="result-count" aria-live="polite"></span>

    </div>

    <!-- ── Quotes Table ───────────────────────────────────────────
         renderQuoteRow() produces 7 <td> per row:
           1. RFQ Title + Part Name  (cell-primary + cell-secondary)
           2. OEM Name
           3. Price                  (.td-number)
           4. Lead Time              (.td-number)
           5. Payment Terms
           6. Submitted Date
           7. Status badge

         When quote.notes exists a second <tr class="quote-notes-row">
         is injected with colspan="7".

         tbody id="quotesTableBody" — REQUIRED:
           loadQuotes()     → tbody.innerHTML = _tableLoading()
           renderQuotes()   → tbody.innerHTML = rows
           bindEvents()     — no direct listener on tbody
    ──────────────────────────────────────────────────────────── -->
    <div class="orders-table-card">
      <div class="table-container">
        <table class="data-table" aria-label="My submitted quotes">
          <thead>
            <tr>
              <th scope="col">RFQ / Part</th>
              <th scope="col">OEM</th>
              <th scope="col" class="td-number">Price</th>
              <th scope="col" class="td-number">Lead Time</th>
              <th scope="col">Payment</th>
              <th scope="col">Submitted</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <!--
            id="quotesTableBody"
            Old HTML used <div id="quotesList"> — wrong element type.
            JS injects <tr> rows so this MUST be a <tbody>.
          -->
          <tbody id="quotesTableBody" aria-live="polite">
            <!-- skeleton injected by _tableLoading() on first load -->
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="/js/pages/supplier/quotes.js"></script>

</body>
</html>
