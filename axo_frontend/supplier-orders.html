<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/supplier-dashboard.css" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/supplier.css" />
</head>
<body>

<div class="supplier-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>Supplier Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="Supplier navigation">
      <a href="/supplier-dashboard.html" class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/supplier-rfq.html"       class="nav-item"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Inbox</span></a>
      <a href="/supplier-quotes.html"    class="nav-item"><i class="fas fa-comment-dollar" aria-hidden="true"></i><span>My Quotes</span></a>
      <a href="/supplier-orders.html"    class="nav-item active"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span>My Orders</span></a>
      <a href="/supplier-profile.html"   class="nav-item"><i class="fas fa-building"      aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" — setText() in init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-truck"></i></div>
        </div>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>My Orders</h1>
        <p>Track and manage your purchase orders</p>
      </div>
      <!-- id="refreshBtn" — bindEvents() → loadOrders() -->
      <button class="btn btn--outline" id="refreshBtn" type="button">
        <i class="fas fa-sync-alt" aria-hidden="true"></i> Refresh
      </button>
    </div>

    <!-- ── Filters Bar ─────────────────────────────────────────
         statusFilter   — el("statusFilter") change → applyFilters()
         searchInput    — debounced input → applyFilters()
         clearSearchBtn — resets input + re-renders
         resultCount    — setText("resultCount", "X of Y orders")
    ──────────────────────────────────────────────────────────── -->
    <div class="filters-bar">

      <!--
        id="statusFilter"
        bindEvents(): change → State.statusFilter = e.target.value → renderOrders()
      -->
      <select id="statusFilter" class="filter-select" aria-label="Filter by status">
        <option value="all">All Orders</option>
        <option value="pending">Pending</option>
        <option value="accepted">Accepted</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="delayed">Delayed</option>
      </select>

      <div class="search-wrap">
        <!--
          id="searchInput"
          debounced input → State.searchQuery → applyFilters() → renderOrders()
        -->
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by PO number, part or OEM…"
          aria-label="Search orders"
        />
        <!--
          id="clearSearchBtn"
          Resets searchInput.value + State.searchQuery + renderOrders()
        -->
        <button
          type="button"
          id="clearSearchBtn"
          class="btn btn--ghost btn--sm search-clear"
          aria-label="Clear search"
          title="Clear search"
        >
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>

      <!--
        id="resultCount"
        setText("resultCount", `${filtered.length} of ${total} orders`)
      -->
      <span id="resultCount" class="result-count" aria-live="polite"></span>

    </div>

    <!-- ── Orders Table ───────────────────────────────────────────
         renderOrderRow() produces 8 <td> per row:
           1. PO Number   (.po-number)
           2. OEM Name
           3. Part Name
           4. Qty         (.td-number)
           5. Value       (.td-number)
           6. Status      (.badge)
           7. Progress    (.progress-wrap)
           8. Date

         Note: _tableLoading() and _tableEmpty() use colspan="7"
         which is less than 8 — rows will span slightly short of the
         last column but remain functional. This is a known JS quirk;
         fix by updating colspan to "8" in orders.js when possible.

         tbody id="ordersTableBody" — REQUIRED:
           loadOrders()  → tbody.innerHTML = _tableLoading()
           renderOrders()→ tbody.innerHTML = rows
           bindEvents()  → click/keydown delegation on tbody
    ──────────────────────────────────────────────────────────── -->
    <div class="orders-table-card">
      <div class="table-container">
        <table class="data-table" aria-label="My purchase orders">
          <thead>
            <tr>
              <th scope="col">PO Number</th>
              <th scope="col">OEM</th>
              <th scope="col">Part Name</th>
              <th scope="col" class="td-number">Qty</th>
              <th scope="col" class="td-number">Value</th>
              <th scope="col">Status</th>
              <th scope="col">Progress</th>
              <th scope="col">Date</th>
            </tr>
          </thead>
          <!--
            id="ordersTableBody"
            Old HTML used <div id="ordersList"> — wrong element type.
            JS injects <tr> elements so this MUST be a <tbody>.
            Also wired for click/keydown row navigation in bindEvents().
          -->
          <tbody id="ordersTableBody" aria-live="polite">
            <!-- skeleton injected by _tableLoading() on first load -->
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="/js/pages/supplier/orders.js"></script>

</body>
</html>
