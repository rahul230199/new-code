<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFQ Inbox | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- supplier-dashboard.css: base layout (sidebar, topbar, stat cards) -->
  <link rel="stylesheet" href="./css/supplier-dashboard.css" />
  <!-- shared.css: badges, buttons, modals, skeletons, rfq-card, etc. -->
  <link rel="stylesheet" href="./css/shared.css" />
  <!-- supplier.css: supplier-specific overrides -->
  <link rel="stylesheet" href="./css/supplier.css" />
</head>
<body>

<div class="supplier-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>Supplier Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="Supplier navigation">
      <a href="/supplier-dashboard.html" class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/supplier-rfq.html"       class="nav-item active"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Inbox</span></a>
      <a href="/supplier-quotes.html"    class="nav-item"><i class="fas fa-comment-dollar" aria-hidden="true"></i><span>My Quotes</span></a>
      <a href="/supplier-orders.html"    class="nav-item"><i class="fas fa-shopping-cart"  aria-hidden="true"></i><span>My Orders</span></a>
      <a href="/supplier-profile.html"   class="nav-item"><i class="fas fa-building"      aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" — setText() in init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-truck"></i></div>
        </div>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>RFQ Inbox</h1>
        <p>Browse and submit quotes on open requests</p>
      </div>
      <!-- id="refreshBtn" — bindEvents() → loadRFQs() -->
      <button class="btn btn--outline" id="refreshBtn" type="button">
        <i class="fas fa-sync-alt" aria-hidden="true"></i> Refresh
      </button>
    </div>

    <!-- RFQ count + list
         rfqCount — setText("rfqCount", "5 open RFQs") in renderRFQList()
         rfqList  — setHTML() with skeleton / cards / empty state -->
    <div class="rfq-toolbar">
      <span id="rfqCount" class="result-count" aria-live="polite"></span>
    </div>

    <!--
      id="rfqList"
      renderRFQList() injects .rfq-card.js-rfq-card items.
      Each card has a .js-open-quote button — both wired via delegation.
    -->
    <div id="rfqList" class="rfq-list" aria-live="polite">
      <!-- skeleton shown by _listLoading() on first load -->
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL: SUBMIT QUOTE
     IDs read by handleQuoteSubmit():
       quotePrice | currency | leadTime | paymentTerms | quoteNotes

     id="quoteModalTitle" — setText("quoteModalTitle", "Submit Quote — {rfq}")
     id="quoteForm"       — submit listener
     id="quoteSubmitBtn"  — REQUIRED: disabled during API call
     id="quoteModal"      — showEl/hideEl

     Close: .js-close-modal | backdrop click | Escape key
     ═══════════════════════════════════════════════════════ -->
<div id="quoteModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="quoteModalTitle" style="display:none">
  <div class="modal-content">

    <div class="modal-header">
      <!--
        id="quoteModalTitle"
        setText("quoteModalTitle", `Submit Quote — ${rfqTitle}`)
      -->
      <h3 id="quoteModalTitle">
        <i class="fas fa-comment-dollar" aria-hidden="true"></i> Submit Quote
      </h3>
      <button class="js-close-modal" type="button" aria-label="Close modal">&times;</button>
    </div>

    <div class="modal-body">
      <!--
        id="quoteForm" — submit triggers handleQuoteSubmit()
        No hidden rfqId input — JS uses State.activeRfqId set in openQuoteModal()
      -->
      <form id="quoteForm" novalidate>

        <!-- Price + Currency -->
        <div class="form-row">
          <div class="form-group">
            <label for="quotePrice">Price per unit <span class="form-required">*</span></label>
            <!--
              id="quotePrice"
              el("quotePrice").focus() called in openQuoteModal()
              Validated: parseFloat > 0
            -->
            <input
              type="number"
              id="quotePrice"
              class="form-control"
              step="0.01"
              min="0.01"
              placeholder="0.00"
              required
            />
          </div>
          <div class="form-group">
            <label for="currency">Currency</label>
            <!-- id="currency" — value read by handleQuoteSubmit() -->
            <select id="currency" class="form-control">
              <option value="USD">USD ($)</option>
              <option value="INR">INR (₹)</option>
              <option value="EUR">EUR (€)</option>
            </select>
          </div>
        </div>

        <!-- Lead Time + Payment Terms -->
        <div class="form-row">
          <div class="form-group">
            <label for="leadTime">Lead Time (days) <span class="form-required">*</span></label>
            <!-- id="leadTime" — validated: parseInt > 0 -->
            <input
              type="number"
              id="leadTime"
              class="form-control"
              min="1"
              placeholder="e.g. 30"
              required
            />
          </div>
          <div class="form-group">
            <label for="paymentTerms">Payment Terms</label>
            <!-- id="paymentTerms" — value sent as paymentTerms in payload -->
            <select id="paymentTerms" class="form-control">
              <option value="Net 30">Net 30</option>
              <option value="Net 45">Net 45</option>
              <option value="Net 60">Net 60</option>
              <option value="Advance">Advance</option>
              <option value="LC">LC</option>
            </select>
          </div>
        </div>

        <!-- Notes -->
        <div class="form-group">
          <label for="quoteNotes">Notes <span class="form-hint">(optional)</span></label>
          <!-- id="quoteNotes" — sent as notes in payload -->
          <textarea
            id="quoteNotes"
            class="form-control"
            rows="3"
            placeholder="Any specific terms, certifications, lead time caveats…"
          ></textarea>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn--outline js-close-modal">Cancel</button>
          <!--
            id="quoteSubmitBtn" — REQUIRED by handleQuoteSubmit():
              submitBtn.disabled = true; submitBtn.textContent = "Submitting…"
            Without this id the button stays active and user can double-submit.
          -->
          <button type="submit" class="btn btn--primary" id="quoteSubmitBtn">
            Submit Quote
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="./js/pages/supplier/rfq.js"></script>

</body>
</html>
