<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>RFQ Inbox | AXO Networks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/supplier-dashboard.css">
</head>
<body>
<div class="supplier-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>AXO Networks</h2><p>Supplier Portal</p></div>
        <nav class="sidebar-nav">
            <a href="/supplier-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="/supplier-rfq.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>RFQ Inbox</span></a>
            <a href="/supplier-quotes.html" class="nav-item"><i class="fas fa-comment-dollar"></i><span>My Quotes</span></a>
            <a href="/supplier-orders.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>My Orders</span></a>
            <a href="/supplier-profile.html" class="nav-item"><i class="fas fa-building"></i><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer"><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
    </aside>
    <main class="main-content">
        <div class="top-bar"><button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button><div class="top-bar-right"><div class="notification-bell"><i class="far fa-bell"></i><span class="notification-badge">0</span></div><div class="user-info"><span id="companyName">Loading...</span><div class="avatar"><i class="fas fa-truck"></i></div></div></div></div>
        <div class="page-header"><div><h1>RFQ Inbox</h1><p>Browse and quote on open requests</p></div><button class="btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button></div>
        <div id="rfqList" class="rfq-list"><div class="loading">Loading RFQs...</div></div>
    </main>
</div>
<div id="quoteModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-comment-dollar"></i> Submit Quote</h3><button class="close-modal">&times;</button></div>
<div class="modal-body"><form id="quoteForm"><input type="hidden" id="quoteRfqId"><div class="form-row"><div class="form-group"><label>Price *</label><input type="number" step="0.01" id="quotePrice" required></div><div class="form-group"><label>Currency</label><select id="currency"><option value="USD">USD ($)</option><option value="INR">INR (₹)</option></select></div></div>
<div class="form-row"><div class="form-group"><label>Lead Time (days) *</label><input type="number" id="leadTime" required></div><div class="form-group"><label>Payment Terms</label><select id="paymentTerms"><option>Net 30</option><option>Net 45</option><option>Net 60</option></select></div></div>
<div class="form-group"><label>Notes</label><textarea id="quoteNotes" rows="3"></textarea></div><div class="form-actions"><button type="button" class="btn-secondary close-modal">Cancel</button><button type="submit" class="btn-primary">Submit Quote</button></div></form></div></div></div>
<script src="/js/supplier-rfq.js"></script>
</body>
</html>
