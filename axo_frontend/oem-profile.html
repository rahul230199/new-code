<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | AXO Networks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="./css/oem-dashboard.css" />
  <link rel="stylesheet" href="./css/shared.css" />
</head>
<body>

<div class="oem-container">

  <!-- ═══════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AXO Networks</h2>
      <p>OEM Portal</p>
    </div>
    <nav class="sidebar-nav" aria-label="OEM navigation">
      <a href="/oem-dashboard.html"  class="nav-item"><i class="fas fa-chart-line"    aria-hidden="true"></i><span>Dashboard</span></a>
      <a href="/oem-rfq.html"        class="nav-item"><i class="fas fa-file-alt"      aria-hidden="true"></i><span>RFQ Management</span></a>
      <a href="/oem-orders.html"     class="nav-item"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span>Orders</span></a>
      <a href="/oem-suppliers.html"  class="nav-item"><i class="fas fa-truck"          aria-hidden="true"></i><span>Suppliers</span></a>
      <a href="/oem-documents.html"  class="nav-item"><i class="fas fa-folder-open"   aria-hidden="true"></i><span>Documents</span></a>
      <a href="/oem-profile.html"    class="nav-item active"><i class="fas fa-building" aria-hidden="true"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle sidebar">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <div class="top-bar-right">
        <div class="notification-bell" aria-label="Notifications">
          <i class="far fa-bell" aria-hidden="true"></i>
          <span class="notification-badge">0</span>
        </div>
        <div class="user-info">
          <!-- id="companyName" — setText() in init() -->
          <span id="companyName">Loading…</span>
          <div class="avatar" aria-hidden="true"><i class="fas fa-industry"></i></div>
        </div>
      </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>Company Profile</h1>
        <p>Manage your company information</p>
      </div>
      <!--
        id="editProfileBtn"
        bindEvents(): populateEditForm(State.profile) → _setMode("edit")
      -->
      <button class="btn btn--primary" id="editProfileBtn" type="button">
        <i class="fas fa-edit" aria-hidden="true"></i> Edit Profile
      </button>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         PROFILE WRAPPER
         id="profileWrapper"
           _setMode("view") → setAttribute("data-mode", "view")
           _setMode("edit") → setAttribute("data-mode", "edit")
           loadProfile()    → classList.add/remove("loading")

         CSS in shared.css controls which [data-panel] is visible:
           [data-mode="view"] [data-panel="view"] { display: block }
           [data-mode="edit"] [data-panel="edit"] { display: block }
           others                                 { display: none  }

         Starts at data-mode="view" so view panel is visible before
         JS runs (avoids flash of empty content).
         ═══════════════════════════════════════════════════════════ -->
    <div id="profileWrapper" class="profile-wrapper" data-mode="view">

      <!-- ─────────────────────────────────────────────────────────
           VIEW PANEL
           data-panel="view" — visible when data-mode="view"
           All ids set by renderView():
             avatarInitials | profileCompanyName | profileRole
             viewEmail | viewPhone | viewWebsite | viewCity | viewCountry
           ───────────────────────────────────────────────────────── -->
      <div data-panel="view" class="profile-card">

        <!-- Avatar + name header -->
        <div class="profile-header-row">
          <!--
            .profile-avatar-initials — CSS in shared.css
            id="avatarInitials" — setText("avatarInitials", getInitials(company_name))
          -->
          <div class="profile-avatar-initials" id="avatarInitials" aria-hidden="true">—</div>
          <div>
            <!-- id="profileCompanyName" — setText() → company_name -->
            <div class="profile-company-name" id="profileCompanyName">Loading…</div>
            <!-- id="profileRole" — setText() → "OEM Partner" -->
            <div class="profile-role" id="profileRole"></div>
          </div>
        </div>

        <!-- Info grid: email, phone, website, city, country -->
        <div class="profile-view-grid">

          <div class="profile-view-item">
            <span class="profile-view-item__label">Email</span>
            <!-- id="viewEmail" — read-only, set by renderView() -->
            <span class="profile-view-item__value" id="viewEmail">—</span>
          </div>

          <div class="profile-view-item">
            <span class="profile-view-item__label">Phone</span>
            <!-- id="viewPhone" -->
            <span class="profile-view-item__value" id="viewPhone">—</span>
          </div>

          <div class="profile-view-item">
            <span class="profile-view-item__label">Website</span>
            <!-- id="viewWebsite" -->
            <span class="profile-view-item__value" id="viewWebsite">—</span>
          </div>

          <div class="profile-view-item">
            <span class="profile-view-item__label">City</span>
            <!-- id="viewCity" -->
            <span class="profile-view-item__value" id="viewCity">—</span>
          </div>

          <div class="profile-view-item">
            <span class="profile-view-item__label">Country</span>
            <!-- id="viewCountry" -->
            <span class="profile-view-item__value" id="viewCountry">—</span>
          </div>

        </div>
      </div><!-- /[data-panel="view"] -->

      <!-- ─────────────────────────────────────────────────────────
           EDIT PANEL
           data-panel="edit" — visible when data-mode="edit"

           populateEditForm() calls:
             setText("editEmailDisplay", ...)   — read-only display
             setText("editCompanyDisplay", ...) — read-only display
             setVal("editPhone", ...)
             setVal("editWebsite", ...)
             setVal("editCity", ...)
             setVal("editCountry", ...)

           saveProfile() reads:
             editPhone | editWebsite | editCity | editCountry

           Backend accepts ONLY: phone, website, city, country
           company_name and email are read-only — shown for context.
           ───────────────────────────────────────────────────────── -->
      <div data-panel="edit" class="profile-card">

        <!--
          id="profileForm"
          bindEvents(): el("profileForm").addEventListener("submit", saveProfile)
        -->
        <form id="profileForm" novalidate>

          <!-- Read-only context fields -->
          <div class="form-section">
            <h4 class="form-section__title">Account (read-only)</h4>
            <div class="form-row">
              <div class="form-group">
                <label>Company Name</label>
                <!--
                  id="editCompanyDisplay"
                  setText("editCompanyDisplay", profile.company_name)
                  Not an <input> — not editable, backend ignores it
                -->
                <div class="form-control form-control--readonly" id="editCompanyDisplay">—</div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <!--
                  id="editEmailDisplay"
                  setText("editEmailDisplay", profile.email)
                -->
                <div class="form-control form-control--readonly" id="editEmailDisplay">—</div>
              </div>
            </div>
          </div>

          <!-- Editable fields -->
          <div class="form-section">
            <h4 class="form-section__title">Contact Details</h4>
            <div class="form-row">
              <div class="form-group">
                <label for="editPhone">Phone</label>
                <!-- id="editPhone" — setVal() + saveProfile() reads .value -->
                <input type="tel" id="editPhone" class="form-control" placeholder="+1 234 567 8900" />
              </div>
              <div class="form-group">
                <label for="editWebsite">Website</label>
                <!-- id="editWebsite" -->
                <input type="url" id="editWebsite" class="form-control" placeholder="https://yourcompany.com" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="editCity">City</label>
                <!-- id="editCity" -->
                <input type="text" id="editCity" class="form-control" placeholder="e.g. Detroit" />
              </div>
              <div class="form-group">
                <label for="editCountry">Country</label>
                <!-- id="editCountry" -->
                <input type="text" id="editCountry" class="form-control" placeholder="e.g. USA" />
              </div>
            </div>
          </div>

          <!-- Form actions -->
          <div class="form-actions">
            <!--
              id="cancelEditBtn"
              bindEvents(): _setMode("view")
            -->
            <button type="button" class="btn btn--outline" id="cancelEditBtn">Cancel</button>
            <!--
              id="saveProfileBtn"
              saveProfile(): btn.disabled = true; btn.textContent = "Saving…"
            -->
            <button type="submit" class="btn btn--primary" id="saveProfileBtn">Save Changes</button>
          </div>

        </form>
      </div><!-- /[data-panel="edit"] -->

      <!-- ─────────────────────────────────────────────────────────
           CHANGE PASSWORD SECTION
           Always visible — not gated by view/edit mode.
           Shown below both panels.

           handleChangePassword() reads:
             currentPassword | newPassword | confirmPassword

           bindEvents():
             el("passwordForm").addEventListener("submit", handleChangePassword)

           id="savePasswordBtn" — disabled during API call
           ───────────────────────────────────────────────────────── -->
      <div class="profile-card" style="margin-top: 20px;">
        <h3 class="profile-section-title">
          <i class="fas fa-lock" aria-hidden="true"></i> Change Password
        </h3>

        <!--
          id="passwordForm"
          bindEvents(): el("passwordForm").addEventListener("submit", handleChangePassword)
        -->
        <form id="passwordForm" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label for="currentPassword">Current Password</label>
              <!-- id="currentPassword" — read by handleChangePassword() -->
              <input
                type="password"
                id="currentPassword"
                class="form-control"
                placeholder="Enter current password"
                autocomplete="current-password"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <!-- id="newPassword" — min 8 chars, validated before API call -->
              <input
                type="password"
                id="newPassword"
                class="form-control"
                placeholder="Min. 8 characters"
                autocomplete="new-password"
                minlength="8"
              />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm New Password</label>
              <!-- id="confirmPassword" — must match newPassword -->
              <input
                type="password"
                id="confirmPassword"
                class="form-control"
                placeholder="Repeat new password"
                autocomplete="new-password"
              />
            </div>
          </div>

          <div class="form-actions">
            <!--
              id="savePasswordBtn"
              handleChangePassword(): btn.disabled = true; btn.textContent = "Updating…"
            -->
            <button type="submit" class="btn btn--primary" id="savePasswordBtn">
              Update Password
            </button>
          </div>

        </form>
      </div><!-- /.profile-card (password) -->

    </div><!-- /#profileWrapper -->

  </main>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════════════════ -->
<script type="module" src="./js/pages/oem/profile.js"></script>

</body>
</html>
